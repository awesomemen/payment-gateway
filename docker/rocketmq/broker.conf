# docker/rocketmq/broker.conf

brokerClusterName = LocalCluster
brokerName = broker-local
brokerId = 0

# 关键：在 Docker 网络内广播可达地址
brokerIP1 = rocketmq-broker

# NameServer 地址
namesrvAddr = gateway-rocketmq-namesrv:9876

# 存储路径（容器内）
storePathRootDir = /home/rocketmq/store
storePathCommitLog = /home/rocketmq/store/commitlog
storePathConsumeQueue = /home/rocketmq/store/consumequeue
storePathIndex = /home/rocketmq/store/index

# 自动创建 Topic（本地开发方便，生产禁止）
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# 刷盘方式：ASYNC 性能更好，本地开发用
flushDiskType = ASYNC_FLUSH

# 监听端口
listenPort = 10911
fastListenPort = 10909
haListenPort = 10912

# 消息最大 4MB
maxMessageSize = 4194304
